<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0">
<style>
  * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI', Arial, sans-serif; }
  body { background:#f4f4f4; display:flex; justify-content:center; padding:20px 12px; position:relative; overflow-x:hidden; min-width:0; }
  .card { background:#fff; max-width:460px; width:100%; border-radius:10px; overflow:hidden; box-shadow:0 4px 18px rgba(0,0,0,0.1); position:relative; z-index:2; box-sizing:border-box; }
  .header { background:#F7F7F7; padding:20px; text-align:center; }
  .header img { max-width:160px; width:100%; height:auto; }
  .title { background:#FFC72C; padding:16px 24px; }
  .title h1 { font-size:18px; color:#000; }
  .body { padding:24px; }
  label { display:block; font-size:14px; font-weight:600; margin:14px 0 5px; color:#222; }
  label .req { color:#e53935; }
  input, select { width:100%; padding:10px; font-size:14px; border:1px solid #ccc; border-radius:6px; }
  input:focus, select:focus { outline:none; border-color:#FFC72C; }
  button { margin-top:20px; width:100%; padding:13px; background:#000; color:#FFC72C; font-weight:700; font-size:15px; border:none; border-radius:6px; cursor:pointer; }
  button:hover { background:#222; }
  button:disabled { background:#555; cursor:not-allowed; }

  .success {
    display:none;
    text-align:center;
    padding:40px 24px;
  }

  .success.show {
    animation: fadeInUp 0.5s ease forwards;
  }

  @keyframes fadeInUp {
    from { opacity:0; transform: translateY(20px); }
    to { opacity:1; transform: translateY(0); }
  }

  .checkmark-circle {
    width: 80px;
    height: 80px;
    margin: 0 auto 16px;
    display: block;
  }

  .checkmark-circle .circle {
    stroke-dasharray: 151;
    stroke-dashoffset: 151;
    stroke-width: 3;
    stroke: #FFC72C;
    fill: none;
    animation: circleDraw 0.5s ease-out forwards;
  }

  .checkmark-circle .check {
    stroke-dasharray: 36;
    stroke-dashoffset: 36;
    stroke: #000;
    stroke-width: 4;
    stroke-linecap: round;
    stroke-linejoin: round;
    fill: none;
    animation: checkDraw 0.3s 0.5s ease-out forwards;
  }

  @keyframes circleDraw { to { stroke-dashoffset: 0; } }
  @keyframes checkDraw { to { stroke-dashoffset: 0; } }

  .success h2 { margin-bottom: 8px; font-size:22px; }
  .success p { color: #555; font-size: 14px; }

  #confettiCanvas {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    pointer-events: none;
    z-index: 9999;
  }
</style>
</head>

  <div class="title"><h1>Book Your Free 1st Class</h1></div>
  <div class="body" id="formBody">
    <label>Name <span class="req">*</span></label>
    <input type="text" id="name" required>

    <label>WhatsApp Number <span class="req">*</span></label>
    <input type="tel" id="whatsapp" required>

    <label>Email <span class="req">*</span></label>
    <input type="email" id="email" required>

    <label>What is your profession?</label>
    <select id="profession">
      <option>Student</option>
      <option>Job Seeker / Fresher</option>
      <option>Working Professional</option>
      <option>Business Owner / Entrepreneur</option>
      <option>Other</option>
    </select>

    <label>What's your biggest challenge with English?</label>
    <select id="challenge">
      <option>Speaking confidently in interviews/meetings</option>
      <option>Writing professional emails & reports</option>
      <option>Grammar & vocabulary</option>
      <option>Workplace communication</option>
      <option>Building confidence overall</option>
    </select>

    <label>Preferred Date <span class="req">*</span></label>
    <input type="date" id="prefDate" required>

    <label>Preferred Time <span class="req">*</span></label>
    <input type="time" id="prefTime" required>

    <button id="submitBtn" onclick="submitForm()">Submit</button>
  </div>
  <div class="success" id="successMsg">
    <svg class="checkmark-circle" viewBox="0 0 52 52">
      <circle class="circle" cx="26" cy="26" r="24"/>
      <path class="check" d="M14 27l7 7 16-16"/>
    </svg>
    <h2>You're booked! &#127881;</h2>
    <p>Our team will reach out on WhatsApp to confirm your class timing.</p>
  </div>
</div>

<script>
function submitForm() {
  var name = document.getElementById('name').value;
  var whatsapp = document.getElementById('whatsapp').value;
  var email = document.getElementById('email').value;
  var prefDate = document.getElementById('prefDate').value;
  var prefTime = document.getElementById('prefTime').value;

  if (!name || !whatsapp || !email || !prefDate || !prefTime) {
    alert('Please fill all required fields.');
    return;
  }

  var btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.innerText = 'Submitting...';

  var data = {
    name: name,
    whatsapp: whatsapp,
    email: email,
    profession: document.getElementById('profession').value,
    challenge: document.getElementById('challenge').value,
    availability: prefDate + ' ' + prefTime
  };

  fetch('https://script.google.com/macros/s/AKfycbzM-_Ia_9ncTAHSkaAyc-L6Hy_ubPOS1oy_keSPziF9uUfc1DGvguZbMgigVxrUMnGj/exec', {
    method: 'POST',
    mode: 'no-cors',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify(data)
  })
  .then(function() {
    document.getElementById('formBody').style.display = 'none';
    var success = document.getElementById('successMsg');
    success.style.display = 'block';
    success.classList.add('show');
    launchConfetti();
  })
  .catch(function(err) {
    alert('Error: ' + err.message);
    btn.disabled = false;
    btn.innerText = 'Submit';
  });
}

// ---- Firecracker / Confetti burst ----
function launchConfetti() {
  var canvas = document.getElementById('confettiCanvas');
  var ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  var colors = ['#FFC72C', '#000000', '#FF5252', '#4CAF50', '#2196F3', '#FF9800'];
  var particles = [];

  var bursts = [
    { x: canvas.width * 0.25, y: canvas.height * 0.35 },
    { x: canvas.width * 0.75, y: canvas.height * 0.3 },
    { x: canvas.width * 0.5, y: canvas.height * 0.45 }
  ];

  bursts.forEach(function(origin, bi) {
    setTimeout(function() {
      for (var i = 0; i < 60; i++) {
        var angle = Math.random() * Math.PI * 2;
        var speed = Math.random() * 6 + 3;
        particles.push({
          x: origin.x,
          y: origin.y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          size: Math.random() * 6 + 3,
          color: colors[Math.floor(Math.random() * colors.length)],
          life: 0,
          maxLife: 60 + Math.random() * 30,
          shape: Math.random() > 0.5 ? 'circle' : 'rect',
          rotation: Math.random() * 360,
          rotSpeed: (Math.random() - 0.5) * 10
        });
      }
    }, bi * 200);
  });

  var gravity = 0.15;
  var frame = 0;
  var maxFrames = 150;

  function animate() {
    frame++;
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    particles.forEach(function(p) {
      p.life++;
      p.x += p.vx;
      p.y += p.vy;
      p.vy += gravity;
      p.vx *= 0.98;
      p.rotation += p.rotSpeed;

      var opacity = Math.max(0, 1 - p.life / p.maxLife);

      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation * Math.PI / 180);
      ctx.globalAlpha = opacity;
      ctx.fillStyle = p.color;

      if (p.shape === 'circle') {
        ctx.beginPath();
        ctx.arc(0, 0, p.size / 2, 0, Math.PI * 2);
        ctx.fill();
      } else {
        ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size * 0.6);
      }

      ctx.restore();
    });

    if (frame < maxFrames) {
      requestAnimationFrame(animate);
    } else {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
    }
  }

  animate();
}
</script>
</body>
</html>
